<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff6b9d">
    <meta name="description" content="Tap the keys in time with falling notes to create music!">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>🎹 Piano Rhythm Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            margin-bottom: 10px;
        }

        #score-board {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
            color: #fff;
        }

        .score-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b9d;
        }

        #game-area {
            flex: 1;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #note-lanes {
            display: flex;
            height: 100%;
            position: relative;
        }

        .lane {
            flex: 1;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .lane:last-child {
            border-right: none;
        }

        .hit-line {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .note {
            position: absolute;
            width: 100%;
            height: 50px;
            border-radius: 8px;
            left: 0;
            transition: transform 0.1s;
        }

        .note.hit {
            transform: scale(1.2);
            opacity: 0.8;
        }

        .note.missed {
            opacity: 0.3;
        }

        #piano-keys {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .piano-key {
            flex: 1;
            height: 180px;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .piano-key:active, .piano-key.active {
            transform: translateY(5px);
            filter: brightness(1.3);
        }

        .key-1 { background: linear-gradient(180deg, #ff6b9d, #c44569); }
        .key-2 { background: linear-gradient(180deg, #4ecdc4, #22a6b3); }
        .key-3 { background: linear-gradient(180deg, #ffeaa7, #fdcb6e); color: #333 !important; }
        .key-4 { background: linear-gradient(180deg, #a29bfe, #6c5ce7); }
        .key-5 { background: linear-gradient(180deg, #81ecec, #00cec9); }
        .key-6 { background: linear-gradient(180deg, #fd79a8, #e84393); }

        .key-label {
            font-size: 14px;
            opacity: 0.8;
        }

        #combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.8);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #combo-display.show {
            opacity: 1;
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 15px;
        }

        #game-over-screen {
            display: none;
        }

        .screen-title {
            font-size: 36px;
            color: #ff6b9d;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #feedback {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feedback-perfect { color: #00ff88; }
        .feedback-good { color: #4ecdc4; }
        .feedback-bad { color: #ff6b9d; }

        #mobile-hint {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h1 style="margin: 0;">🎹 Piano Rhythm</h1>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" style="padding: 8px 15px; font-size: 14px;" onclick="togglePause()" id="pause-btn" disabled>⏸️</button>
                    <button class="btn" style="padding: 8px 15px; font-size: 14px;" onclick="showSettings()">⚙️</button>
                </div>
            </div>
            <div id="mobile-hint">Tap the keys or press 1-6 / Q-I</div>
        </div>

        <div id="score-board">
            <div class="score-item">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Combo</div>
                <div class="score-value" id="combo">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Accuracy</div>
                <div class="score-value" id="accuracy">100%</div>
            </div>
        </div>

        <div id="game-area">
            <div id="note-lanes">
                <div class="lane" data-key="1"></div>
                <div class="lane" data-key="2"></div>
                <div class="lane" data-key="3"></div>
                <div class="lane" data-key="4"></div>
                <div class="lane" data-key="5"></div>
                <div class="lane" data-key="6"></div>
            </div>
            <div class="hit-line"></div>
            <div id="feedback"></div>
            <div id="combo-display"></div>

            <div id="start-screen">
                <div class="screen-title">🎹 Piano Rhythm</div>
                <p style="color: #888; margin-bottom: 20px; text-align: center; padding: 0 20px;">
                    Hit the notes when they reach the line!<br>
                    Follow the melody and keep the rhythm.
                </p>
                <button class="btn" onclick="startGame()">▶️ Start Game</button>
                <button class="btn" onclick="selectSong()">🎵 Select Song</button>
                <button class="btn" onclick="showSettings()">⚙️ Settings</button>
            </div>

            <div id="game-over-screen">
                <div class="screen-title">🎮 Game Over</div>
                <div id="final-score" style="color: #fff; font-size: 24px; margin-bottom: 20px;"></div>
                <div id="high-scores"></div>
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="startGame()">🔄 Play Again</button>
                    <button class="btn" onclick="showStartScreen()">🏠 Menu</button>
                </div>
            </div>
            
            <!-- Pause Overlay -->
            <div id="pause-overlay" style="display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 50; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px;">
                <div style="font-size: 48px; color: #fff; margin-bottom: 30px;">⏸️ Paused</div>
                <button class="btn" onclick="togglePause()">▶️ Resume</button>
                <button class="btn" onclick="quitGame()">🏠 Quit to Menu</button>
            </div>
            
            <!-- Settings Modal -->
            <div id="settings-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center;">
                <div style="background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 30px; max-width: 400px; width: 90%; border: 2px solid #4a9eff;">
                    <h2 style="color: #fff; margin-bottom: 20px; text-align: center;">⚙️ Settings</h2>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="color: #fff; display: block; margin-bottom: 10px;">🔊 Volume: <span id="volume-value">30</span>%</label>
                        <input type="range" id="volume-slider" min="0" max="100" value="30" style="width: 100%;" oninput="updateVolume(this.value)">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="color: #fff; display: block; margin-bottom: 10px;">⚡ Note Speed: <span id="speed-value">100</span>%</label>
                        <input type="range" id="speed-slider" min="50" max="200" value="100" style="width: 100%;" oninput="updateSpeed(this.value)">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="color: #fff; display: flex; align-items: center; justify-content: space-between;">
                            <span>🎵 Key Sounds</span>
                            <input type="checkbox" id="sounds-toggle" checked onchange="toggleSounds(this.checked)" style="width: 20px; height: 20px;">
                        </label>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="color: #fff; display: flex; align-items: center; justify-content: space-between;">
                            <span>✨ Particle Effects</span>
                            <input type="checkbox" id="particles-toggle" checked onchange="toggleParticles(this.checked)" style="width: 20px; height: 20px;">
                        </label>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 30px;">
                        <button class="btn" style="flex: 1;" onclick="saveSettings()">💾 Save</button>
                        <button class="btn" style="flex: 1; background: linear-gradient(135deg, #666, #444);" onclick="closeSettings()">❌ Close</button>
                    </div>
                    
                    <button class="btn" style="width: 100%; margin-top: 15px; background: linear-gradient(135deg, #d63031, #c0392b);" onclick="resetSettings()">🔄 Reset to Defaults</button>
                </div>
            </div>
        </div>

        <div id="piano-keys">
            <div class="piano-key key-1" data-key="1" ontouchstart="handleInput(1)" onmousedown="handleInput(1)">
                1<span class="key-label">Q</span>
            </div>
            <div class="piano-key key-2" data-key="2" ontouchstart="handleInput(2)" onmousedown="handleInput(2)">
                2<span class="key-label">W</span>
            </div>
            <div class="piano-key key-3" data-key="3" ontouchstart="handleInput(3)" onmousedown="handleInput(3)">
                3<span class="key-label">E</span>
            </div>
            <div class="piano-key key-4" data-key="4" ontouchstart="handleInput(4)" onmousedown="handleInput(4)">
                4<span class="key-label">R</span>
            </div>
            <div class="piano-key key-5" data-key="5" ontouchstart="handleInput(5)" onmousedown="handleInput(5)">
                5<span class="key-label">T</span>
            </div>
            <div class="piano-key key-6" data-key="6" ontouchstart="handleInput(6)" onmousedown="handleInput(6)">
                6<span class="key-label">Y</span>
            </div>
        </div>
    </div>

    <script src="src/audio.js"></script>
    <script src="src/settings.js"></script>
    <script src="src/particles.js"></script>
    <script src="src/highscores.js"></script>
    <script src="src/songs.js"></script>
    <script src="src/game.js"></script>
    
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker registered'))
                .catch(err => console.error('❌ SW registration failed:', err));
        }
    </script>
</body>
</html>
